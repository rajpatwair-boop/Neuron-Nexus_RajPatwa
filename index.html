<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-title">
                <span class="logo">🤖</span>
                <div>
                    <h1>AI Assistant</h1>
                    <span class="status" id="status">Ready</span>
                </div>
            </div>
            <button class="clear-btn" onclick="clearChat()" title="Clear chat">
                🗑️ Clear
            </button>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages" id="messages">
            <div class="welcome-message">
                <div class="welcome-icon">👋</div>
                <h2>Welcome! I'm your AI Assistant</h2>
                <p>I can help you with:</p>
                <div class="capabilities">
                    <span class="tag">💻 Coding</span>
                    <span class="tag">📚 Study Help</span>
                    <span class="tag">🔢 Math</span>
                    <span class="tag">🌍 General Knowledge</span>
                    <span class="tag">✍️ Writing</span>
                </div>
                <p class="hint">Ask me anything!</p>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typing" style="display: none;">
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span>AI is thinking...</span>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea 
                    id="user-input" 
                    placeholder="Type your message..."
                    rows="1"
                    onkeypress="handleKeyPress(event)"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-hint">Press Enter to send • Shift+Enter for new line</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
