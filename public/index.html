<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Multi-Mode Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>AI Chat</span>
                </div>
                <button class="new-chat-btn" onclick="chatApp.clearChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>

            <!-- Mode Selection -->
            <div class="mode-section">
                <h3>Select Mode</h3>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="general" onclick="chatApp.setMode('general')">
                        <span class="mode-icon">🤖</span>
                        <div class="mode-info">
                            <span class="mode-name">General</span>
                            <span class="mode-desc">Smart AI Assistant</span>
                        </div>
                    </button>
                    <button class="mode-btn" data-mode="study" onclick="chatApp.setMode('study')">
                        <span class="mode-icon">📚</span>
                        <div class="mode-info">
                            <span class="mode-name">Study</span>
                            <span class="mode-desc">Expert Teacher</span>
                        </div>
                    </button>
                    <button class="mode-btn" data-mode="coding" onclick="chatApp.setMode('coding')">
                        <span class="mode-icon">💻</span>
                        <div class="mode-info">
                            <span class="mode-name">Coding</span>
                            <span class="mode-desc">Professional Programmer</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Voice Settings -->
            <div class="voice-section">
                <h3>Voice Settings</h3>
                <label class="toggle-label">
                    <input type="checkbox" id="voice-output-toggle" checked>
                    <span class="toggle-slider"></span>
                    <span>Auto-read responses</span>
                </label>
            </div>

            <div class="sidebar-footer">
                <p>Powered by Gemini AI</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <!-- Header -->
            <header class="chat-header">
                <div class="current-mode">
                    <span id="current-mode-icon">🤖</span>
                    <span id="current-mode-name">General Mode</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="chatApp.toggleSidebar()" title="Toggle Sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">👋</div>
                    <h1>Welcome to AI Chat</h1>
                    <p>I'm your intelligent assistant. Select a mode and start chatting!</p>
                    <div class="suggestion-chips">
                        <button onclick="chatApp.setInput('Explain quantum physics simply')">Explain quantum physics</button>
                        <button onclick="chatApp.setInput('Write a Python function to sort a list')">Python sorting function</button>
                        <button onclick="chatApp.setInput('Help me understand photosynthesis')">Photosynthesis</button>
                        <button onclick="chatApp.setInput('What are the best practices for React?')">React best practices</button>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>AI is thinking...</span>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <button class="voice-btn" id="voice-btn" onclick="chatApp.toggleVoiceInput()" title="Voice Input">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <textarea 
                        id="message-input" 
                        placeholder="Type your message..." 
                        rows="1"
                        onkeydown="chatApp.handleKeyDown(event)"
                        oninput="chatApp.autoResize(this)"
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="chatApp.sendMessage()" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-footer">Press Enter to send, Shift+Enter for new line</p>
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
